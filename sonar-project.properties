# SonarQube Scanner Configuration
# Project: Hospital Management System (ZainAftab-dev)
# Course: Software Re-Engineering — BSSE-8B

sonar.projectKey=hospital-management-system
sonar.projectName=Hospital Management System
sonar.projectVersion=1.0

# Source directory (relative to this file)
sonar.sources=src/hms
sonar.java.binaries=.

# Language
sonar.language=java

# Source encoding
sonar.sourceEncoding=UTF-8

# SonarQube server URL
sonar.host.url=http://localhost:9000

# Authentication token (generate from SonarQube dashboard)
sonar.login=admin
sonar.password=admin

# Exclusions (auto-generated files, tests)
sonar.exclusions=**/test/**,**/lib/**,**/*.jar
